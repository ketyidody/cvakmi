services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cvakmi-dev
    ports:
      - "8000:8000"   # Laravel (php artisan serve)
      - "5173:5173"   # Vite dev server / HMR
    volumes:
      # Bind-mount the project for live editing. The named volumes below keep
      # container-installed dependencies from clobbering (or being clobbered by)
      # the host, which also avoids slow bind-mount I/O for these dirs.
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: cvakmi
      DB_USERNAME: cvakmi
      DB_PASSWORD: secret
      ORDER_INVITE_CODE: dev
    depends_on:
      mysql:
        condition: service_healthy
    command:
      - npx
      - concurrently
      - "-k"
      - "-c"
      - "#93c5fd,#c4b5fd,#fb7185,#fdba74"
      - "php artisan serve --host=0.0.0.0 --port=8000"
      - "php artisan queue:listen --tries=1"
      - "npm run dev -- --host 0.0.0.0"
      - "--names=server,queue,vite"

  mysql:
    image: mariadb:11
    ports:
      - "3306:3306"
    environment:
      MARIADB_DATABASE: cvakmi
      MARIADB_USER: cvakmi
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  vendor:
  node_modules:
